<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מערכת דיווח - בית הספר לע"ס ולרווחה חברתית</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --surface: #FFFFFF;
      --bg: #EEF2F7;
      --text: #1A2340;
      --text2: #5A6A85;
      --border: #DDE3ED;
      --shadow: 0 2px 10px rgba(0,0,0,0.08);
      --shadow-lg: 0 6px 24px rgba(0,0,0,0.13);
      --r: 14px;
      --r-sm: 9px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
    }

    /* ── Header ── */
    .hdr {
      background: linear-gradient(135deg, #0D3B8E 0%, #1565C0 60%, #1976D2 100%);
      color: #fff;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 3px 14px rgba(13,59,142,.35);
    }
    .hdr-logo { font-size: 32px; line-height: 1; }
    .hdr-title { font-size: 19px; font-weight: 700; }
    .hdr-sub { font-size: 12px; opacity: .8; margin-top: 2px; }
    .back-btn {
      margin-right: auto;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.35);
      color: #fff;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background .18s;
      display: none;
    }
    .back-btn.vis { display: block; }
    .back-btn:hover { background: rgba(255,255,255,.25); }

    /* ── Layout ── */
    .main { padding: 28px 24px; max-width: 1450px; margin: 0 auto; }

    /* ── Home ── */
    .home-head { text-align: center; margin-bottom: 32px; }
    .home-head h2 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .home-head p { color: var(--text2); font-size: 14px; }

    .prog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    .prog-card {
      background: #fff;
      border-radius: var(--r);
      padding: 30px 18px 24px;
      cursor: pointer;
      text-align: center;
      box-shadow: var(--shadow);
      transition: transform .22s, box-shadow .22s, border-color .22s;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
    }
    .prog-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: var(--pc);
      border-radius: var(--r) var(--r) 0 0;
    }
    .prog-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-lg);
      border-color: var(--pc);
    }
    .prog-icon {
      width: 68px; height: 68px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--pc) 12%, #fff);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      margin: 0 auto 16px;
    }
    .prog-name { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .prog-target { font-size: 12px; color: var(--text2); }
    .prog-target b { color: var(--pc); font-size: 15px; }

    /* ── Program page header ── */
    .prog-hdr {
      background: #fff;
      border-radius: var(--r);
      padding: 18px 22px;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .prog-hdr-icon {
      width: 54px; height: 54px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--pc) 12%, #fff);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .prog-hdr h2 { font-size: 20px; font-weight: 700; }
    .prog-hdr p { color: var(--text2); font-size: 13px; margin-top: 3px; }
    .target-badge {
      margin-right: auto;
      text-align: center;
      background: color-mix(in srgb, var(--pc) 9%, #fff);
      border: 1.5px solid color-mix(in srgb, var(--pc) 28%, #fff);
      border-radius: 10px;
      padding: 10px 22px;
      min-width: 100px;
    }
    .target-badge .lbl { font-size: 11px; color: var(--text2); }
    .target-badge .val { font-size: 26px; font-weight: 800; color: var(--pc); line-height: 1.2; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: #fff;
      border-radius: var(--r) var(--r) 0 0;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .tab-btn {
      flex: 1;
      padding: 15px;
      border: none; background: none;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      color: var(--text2);
      border-bottom: 3px solid transparent;
      transition: all .18s;
    }
    .tab-btn.active { color: var(--pc); border-bottom-color: var(--pc); background: color-mix(in srgb, var(--pc) 5%, #fff); }
    .tab-body {
      background: #fff;
      border-radius: 0 0 var(--r) var(--r);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    /* ── Summary cards ── */
    .sum-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .sum-card {
      background: var(--bg);
      border-radius: var(--r-sm);
      padding: 14px 12px;
      text-align: center;
      border: 1px solid var(--border);
    }
    .sum-card.hl { background: color-mix(in srgb, var(--pc) 9%, #fff); border-color: color-mix(in srgb, var(--pc) 25%, #fff); }
    .sum-card .lbl { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
    .sum-card .val { font-size: 30px; font-weight: 800; color: var(--text); }
    .sum-card.hl .val { color: var(--pc); }
    .sum-card .sub { font-size: 11px; color: var(--text2); margin-top: 4px; }

    /* ── Section title ── */
    .sec-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; color: var(--text); display: flex; align-items: center; gap: 8px; }

    /* ── Historical table ── */
    .tbl-wrap { overflow-x: auto; border-radius: var(--r-sm); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    th {
      background: var(--pc);
      color: #fff;
      padding: 9px 11px;
      text-align: center;
      font-weight: 600;
      white-space: nowrap;
      position: sticky; top: 0; z-index: 2;
    }
    th.pcol { background: #37474F; text-align: right; min-width: 130px; }
    th.curyear { background: color-mix(in srgb, var(--pc) 60%, #000); font-size: 13px; }
    td { padding: 7px 11px; text-align: center; border-bottom: 1px solid #F2F4F8; }
    td.pname { text-align: right; font-weight: 500; color: var(--text2); background: #FAFBFD; border-right: 3px solid var(--pc); }
    tr:hover td { background: #F4F8FF; }
    tr:hover td.pname { background: #EBF2FF; }
    td.curyear { background: color-mix(in srgb, var(--pc) 7%, #fff); font-weight: 700; color: var(--pc); }
    td.nd { color: #CCC; }

    /* ── Chart ── */
    .chart-wrap { position: relative; height: 310px; margin-top: 20px; }

    /* ── Update layout ── */
    .upd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
    @media (max-width: 800px) { .upd-grid { grid-template-columns: 1fr; } }

    .upd-card {
      background: var(--bg);
      border-radius: var(--r-sm);
      padding: 18px;
      border: 1px solid var(--border);
    }
    .upd-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--text); }

    /* Period table inside update */
    .ptbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    .ptbl th { background: #37474F; padding: 7px 10px; font-size: 11.5px; font-weight: 600; }
    .ptbl td { padding: 5px 8px; border-bottom: 1px solid #EAEDF3; }
    .ptbl td:first-child { text-align: right; background: #F7F8FC; color: var(--text2); font-size: 11.5px; min-width: 120px; }
    .ptbl td.pv { color: var(--text2); }
    .ptbl input[type=number] {
      width: 74px; padding: 5px 7px;
      border: 1.5px solid var(--border);
      border-radius: 6px; font-size: 13px;
      text-align: center; background: #fff;
      color: var(--text);
      transition: border-color .15s;
    }
    .ptbl input[type=number]:focus { outline: none; border-color: var(--pc); }

    /* Summary inputs */
    .frow { display: flex; align-items: center; gap: 10px; margin-bottom: 11px; }
    .flabel { font-size: 13px; color: var(--text2); min-width: 160px; }
    .finput {
      flex: 1; padding: 9px 13px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 15px; text-align: center;
      background: #fff; color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }
    .finput:focus { outline: none; border-color: var(--pc); box-shadow: 0 0 0 3px color-mix(in srgb, var(--pc) 18%, transparent); }

    /* Comparison */
    .cmp-box { background: #fff; border-radius: var(--r-sm); padding: 14px; border: 1px solid var(--border); margin-top: 14px; }
    .cmp-box h4 { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
    .cmp-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #F2F4F8; font-size: 12.5px; }
    .cmp-row:last-child { border-bottom: none; }
    .cmp-yr { color: var(--text2); }
    .cmp-vals { display: flex; align-items: center; gap: 6px; }
    .cmp-prev { color: var(--text2); }
    .cmp-curr { font-weight: 700; color: var(--pc); font-size: 15px; }
    .badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 20px; font-size: 10.5px; font-weight: 700; }
    .bu { background: #E8F5E9; color: #1B5E20; }
    .bd { background: #FFEBEE; color: #B71C1C; }
    .bs { background: #FFF3E0; color: #BF360C; }

    /* Notes */
    .notes-ta {
      width: 100%; padding: 10px; font-family: inherit;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 13px; resize: vertical; min-height: 80px;
      direction: rtl; background: #fff; color: var(--text);
      transition: border-color .15s;
    }
    .notes-ta:focus { outline: none; border-color: var(--pc); }

    /* Toast */
    .toast {
      position: fixed; bottom: 22px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1B5E20; color: #fff;
      padding: 11px 24px; border-radius: 24px;
      font-size: 14px; font-weight: 500;
      transition: transform .28s ease;
      z-index: 999;
      box-shadow: 0 4px 16px rgba(0,0,0,.22);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Aggregate notice */
    .agg-notice {
      text-align: center; padding: 40px 20px;
      color: var(--text2);
      border: 2px dashed var(--border);
      border-radius: var(--r);
      margin-top: 10px;
    }
    .agg-notice .icon { font-size: 44px; margin-bottom: 12px; }
    .agg-notice p { font-size: 14px; margin-bottom: 6px; }
    .agg-chips { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 16px; }
    .agg-chip {
      padding: 7px 16px; border-radius: 20px; font-size: 13px;
      font-weight: 600; cursor: pointer; border: 2px solid;
      transition: all .18s;
    }
    .agg-chip:hover { transform: translateY(-2px); }

    /* Responsive */
    @media (max-width: 600px) {
      .main { padding: 14px 10px; }
      .prog-grid { grid-template-columns: 1fr 1fr; }
      .hdr-title { font-size: 15px; }
    }

    .tbl-wrap::-webkit-scrollbar { height: 5px; }
    .tbl-wrap::-webkit-scrollbar-track { background: #EEF; }
    .tbl-wrap::-webkit-scrollbar-thumb { background: #90A4AE; border-radius: 3px; }

    /* ── All-master sub-program rows ── */
    .sub-progs-wrap { display: flex; flex-direction: column; gap: 10px; }
    .sub-prog-row {
      display: flex; align-items: center; gap: 0;
      background: #fff; border-radius: var(--r-sm);
      border: 1.5px solid color-mix(in srgb, var(--pc) 22%, #ddd);
      overflow: hidden;
    }
    .spr-name {
      min-width: 160px; padding: 12px 14px;
      font-weight: 700; font-size: 13px;
      background: color-mix(in srgb, var(--pc) 10%, #fff);
      border-left: 3px solid var(--pc);
      color: var(--pc);
    }
    .spr-cell {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 8px 6px; border-left: 1px solid #F0F2F7; font-size: 12px;
    }
    .spr-lbl { font-size: 10px; color: var(--text2); margin-bottom: 2px; }
    .spr-cell b { font-size: 18px; font-weight: 800; }
    .spr-cell small { font-size: 10px; color: var(--text2); }

    /* ── Email button ── */
    .email-btn {
      display: flex; align-items: center; gap: 8px;
      margin-top: 18px; padding: 13px 20px;
      background: linear-gradient(135deg, #1565C0, #1976D2);
      color: #fff; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      width: 100%; justify-content: center;
      box-shadow: 0 3px 10px rgba(21,101,192,.3);
      transition: opacity .18s, transform .18s;
    }
    .email-btn:hover { opacity: .9; transform: translateY(-1px); }
  </style>
</head>

function load(id) {
  try { return JSON.parse(localStorage.getItem('sws_' + id)) || {}; }
  catch { return {}; }
}
function save(id, data) {
  localStorage.setItem('sws_' + id, JSON.stringify(data));

// ═══════════════════════════════════════════
// DATA ACCESS
// ═══════════════════════════════════════════

function prog(id) { return PROGRAMS.find(p => p.id === id); }

function getReg(id, pi, yi) {
  if (id === 'all_master') {
    const ids = ['social_work', 'nonprofit', 'early_childhood'];
    let sum = 0, any = false;
    ids.forEach(sid => { const v = getReg(sid, pi, yi); if (v !== null) { sum += v; any = true; } });
    return any ? sum : null;
  }
  const ud = load(id);
  if (yi === CUR_YI) {
    const k = 'r' + pi;
    if (ud[k] !== undefined && ud[k] !== '') return Number(ud[k]);
  }
  const rows = HIST_REG[id];
  if (!rows || pi >= rows.length) return null;
  return rows[pi][yi];
}

function getSum(id, field) {
  if (id === 'all_master') {
    const ids = ['social_work', 'nonprofit', 'early_childhood'];
    let sum = 0;
    ids.forEach(sid => { const v = getSum(sid, field); if (v !== null) sum += (v || 0); });
    return sum;
  }
  const ud = load(id);
  if (ud[field] !== undefined && ud[field] !== '') return Number(ud[field]);
  return HIST_SUMMARY[id]?.[field] ?? null;
}

function getTarget(id) {
  const ud = load(id);
  if (ud.target !== undefined && ud.target !== '') return Number(ud.target);
  return prog(id)?.target ?? null;
}

function numPeriods(id) { return NUM_PERIODS[id] ?? 24; }

// Latest registrant value for given year
function latestReg(id, yi) {
  const np = numPeriods(id);
  for (let p = np - 1; p >= 0; p--) {
    const v = getReg(id, p, yi);
    if (v !== null) return { val: v, period: ALL_PERIODS[p] };
  }
  return null;
}

function buildHistTable(id) {
  const np = numPeriods(id);
  const thead = `<thead><tr>
    <th class="pcol">תקופה</th>
    ${YEARS.map((y, yi) => `<th${yi === CUR_YI ? ' class="curyear"' : ''}>${y}</th>`).join('')}
  </tr></thead>`;

  let rows = '';
  for (let pi = 0; pi < np; pi++) {
    rows += `<tr><td class="pname">${ALL_PERIODS[pi]}</td>`;
    for (let yi = 0; yi < YEARS.length; yi++) {
      const v = getReg(id, pi, yi);
      const isCur = yi === CUR_YI;
      if (v === null) rows += `<td class="nd${isCur ? ' curyear' : ''}">—</td>`;
      else rows += `<td${isCur ? ' class="curyear"' : ''}>${v}</td>`;
    }
    rows += '</tr>';
  }

  return `<table>${thead}<tbody>${rows}</tbody></table>`;
}

function initChart(id) {
  const canvas = document.getElementById('regChart');
  if (!canvas) return;
  if (chartInst) { chartInst.destroy(); chartInst = null; }

  const p = prog(id);
  const np = numPeriods(id);
  const labels = ALL_PERIODS.slice(0, np);

  const series = [
    { yi: 6, label: 'תשפ"ג', color: '#BDBDBD', w: 1, r: 2 },
    { yi: 7, label: 'תשפ"ד', color: '#90A4AE', w: 1, r: 2 },
    { yi: 8, label: 'תשפ"ה', color: '#64B5F6', w: 2, r: 3 },
    { yi: 9, label: 'תשפ"ו', color: '#1E88E5', w: 2, r: 4 },
    { yi: 10, label: 'תשפ"ז (נוכחי)', color: p.color, w: 3, r: 5 },
  ];

  const datasets = series.map(s => ({
    label: s.label,
    data: Array.from({ length: np }, (_, pi) => getReg(id, pi, s.yi)),
    borderColor: s.color,
    backgroundColor: 'transparent',
    borderWidth: s.w,
    tension: 0.35,
    spanGaps: true,
    pointRadius: s.r,
    pointHoverRadius: s.r + 3,
    pointBorderWidth: 1.5,
  }));

  chartInst = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', rtl: true, labels: { usePointStyle: true, padding: 16 } },
        tooltip: { rtl: true, mode: 'index', intersect: false }
      },
      scales: {
        x: { ticks: { maxRotation: 45, font: { size: 10.5 } } },
        y: { beginAtZero: true, ticks: { font: { size: 11 } } }
      }
    }
  });
}

function sendUpdateEmail(group, progId) {
  const progName = prog(progId)?.name ?? progId;
  const now = new Date();
  const dateStr = now.toLocaleDateString('he-IL', { day:'2-digit', month:'2-digit', year:'numeric' });
  const timeStr = now.toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });
  const to  = EMAIL_LISTS[group].join(';');
  const sub = encodeURIComponent('עדכון מערכת נרשמים — ' + progName + ' — ' + dateStr);
  const body = encodeURIComponent(
    'שלום,\n\n' +
    'המערכת עודכנה לתאריך ' + dateStr + ' בשעה ' + timeStr + ' לתוכנית ' + progName + '.\n\n' +
    'ניתן להיכנס לצפייה בכתובת:\nhttps://sagieori32-png.github.io/mitkablim/\n\n' +
    'בברכה'
  );
  window.location.href = 'mailto:' + to + '?subject=' + sub + '&body=' + body;
}

function buildAggNotice() {
  const chips = PROGRAMS.filter(p => !p.agg && p.id !== 'bachelor')
    .map(p => `<div class="agg-chip" style="--pc:${p.color};color:${p.color};border-color:${p.color}" onclick="selectProg('${p.id}')">${p.icon} ${p.name}</div>`)
    .join('');
  return `
    <div class="agg-notice">
      <div class="icon">🔗</div>
      <p>תצוגת "כל התוכניות" מרכזת נתונים מכל תוכניות המוסמך.</p>
      <p>לעדכון נתונים יש לגשת לכל תוכנית בנפרד:</p>
      <div class="agg-chips">${chips}</div>
    </div>
  `;
}

function buildComparison(id) {
  const np = numPeriods(id);
  let points = [];
  for (let pi = 0; pi < np; pi++) {
    const cur = getReg(id, pi, CUR_YI);
    const prv = getReg(id, pi, PREV_YI);
    if (cur !== null || prv !== null) points.push({ period: ALL_PERIODS[pi], cur, prv });
  }
  const recent = points.slice(-6);
  if (!recent.length) return '<div style="color:#aaa;font-size:12px">אין נתונים</div>';

  return recent.map(({ period, cur, prv }) => {
    let badge = '';
    if (cur !== null && prv !== null) {
      const d = cur - prv;
      badge = d > 0 ? `<span class="badge bu">+${d}</span>` : d < 0 ? `<span class="badge bd">${d}</span>` : `<span class="badge bs">±0</span>`;
    }
    return `
      <div class="cmp-row">
        <span class="cmp-yr">${period}</span>
        <div class="cmp-vals">
          <span class="cmp-prev">${prv ?? '—'}</span>
          <span style="color:#ccc">→</span>
          <span class="cmp-curr">${cur ?? '—'}</span>
          ${badge}
        </div>
      </div>`;
  }).join('');
}
